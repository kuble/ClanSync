<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ClanSync — Mockup Hub</title>
<link rel="stylesheet" href="styles/main.css">
<style>
.hub-mock-role {
  padding: 4px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.hub-mock-role-hint {
  font-size: 10px;
  line-height: 1.4;
  color: var(--text-muted, #71717a);
  padding: 0 2px;
}
.hub-mock-role-btns {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.hub-mock-role-btn {
  font-size: 12px;
  padding: 6px 10px;
  border-radius: var(--radius-sm, 6px);
  border: 1px solid var(--border);
  background: var(--bg-overlay, rgba(255,255,255,0.04));
  color: var(--text-secondary);
  cursor: pointer;
  font-family: var(--font-sans, system-ui, sans-serif);
  text-align: left;
  transition: color 0.1s, background 0.1s, border-color 0.1s;
}
.hub-mock-role-btn:hover {
  color: var(--text-primary);
  border-color: rgba(124, 58, 237, 0.45);
}
.hub-mock-role-btn.active {
  color: var(--text-primary);
  border-left: 2px solid var(--accent-violet, #7c3aed);
  padding-left: 8px;
  background: var(--surface-active, rgba(124, 58, 237, 0.1));
}
.hub-mock-plan {
  padding: 4px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  border-top: 1px solid var(--border, rgba(255,255,255,0.08));
  margin-top: 4px;
  padding-top: 12px;
}
.hub-mock-plan-btns {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.hub-mock-plan-btn {
  font-size: 12px;
  padding: 6px 10px;
  border-radius: var(--radius-sm, 6px);
  border: 1px solid var(--border);
  background: var(--bg-overlay, rgba(255,255,255,0.04));
  color: var(--text-secondary);
  cursor: pointer;
  font-family: var(--font-sans, system-ui, sans-serif);
  text-align: left;
  transition: color 0.1s, background 0.1s, border-color 0.1s;
}
.hub-mock-plan-btn:hover {
  color: var(--text-primary);
  border-color: rgba(245, 158, 11, 0.45);
}
.hub-mock-plan-btn.active {
  color: var(--text-primary);
  border-left: 2px solid rgba(245, 158, 11, 0.85);
  padding-left: 8px;
  background: rgba(245, 158, 11, 0.08);
}
.hub-mock-theme {
  padding: 4px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  border-top: 1px solid var(--border, rgba(255,255,255,0.08));
  margin-top: 4px;
  padding-top: 12px;
}
.hub-mock-theme-btns {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.hub-mock-theme-btn {
  font-size: 12px;
  padding: 6px 10px;
  border-radius: var(--radius-sm, 6px);
  border: 1px solid var(--border);
  background: var(--bg-overlay, rgba(255,255,255,0.04));
  color: var(--text-secondary);
  cursor: pointer;
  font-family: var(--font-sans, system-ui, sans-serif);
  text-align: left;
}
.hub-mock-theme-btn.active {
  color: var(--text-primary);
  border-left: 2px solid var(--accent-violet, #46af75);
  padding-left: 8px;
  background: var(--surface-active, rgba(70, 175, 117, 0.12));
}
.hub-group-label--row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
/* main-clan .mock-help-tip 과 동일 패턴 — 사이드바는 아래로 펼침 */
.hub-help-tip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1px solid var(--border, rgba(255,255,255,0.12));
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted, #71717a);
  cursor: help;
  position: relative;
  flex-shrink: 0;
  background: var(--bg-overlay, rgba(255,255,255,0.04));
  font-family: inherit;
  line-height: 1;
  padding: 0;
  -webkit-appearance: none;
  appearance: none;
}
.hub-help-tip:focus-visible {
  outline: 2px solid rgba(124, 58, 237, 0.65);
  outline-offset: 2px;
}
/* 사이드바 overflow 때문에 ::after 대신 #hub-tooltip-flyout (fixed) 사용 */
.hub-tooltip-flyout {
  position: fixed;
  z-index: 99999;
  box-sizing: border-box;
  max-width: min(320px, calc(100vw - 16px));
  max-height: min(72vh, 520px);
  overflow-x: hidden;
  overflow-y: auto;
  padding: 10px 12px;
  border-radius: var(--radius-sm, 6px);
  border: 1px solid var(--border, rgba(255,255,255,0.12));
  background: var(--bg-elevated, #18181b);
  color: var(--text-secondary, #a1a1aa);
  font-size: 11px;
  font-weight: 400;
  line-height: 1.5;
  text-align: left;
  white-space: pre-line;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
  -webkit-overflow-scrolling: touch;
  pointer-events: auto;
}
.hub-tooltip-flyout[hidden] {
  display: none !important;
}
</style>
</head>
<body class="hub-shell">

<nav class="hub-nav">
  <div class="hub-logo">⚡ ClanSync</div>

  <div class="hub-group-label">랜딩 · 인증</div>
  <a href="#" onclick="return go(this,'pages/index.html')">랜딩 페이지</a>
  <a href="#" onclick="return go(this,'pages/sign-in.html')">로그인</a>
  <a href="#" onclick="return go(this,'pages/sign-up.html')">회원가입</a>

  <div class="hub-group-label">게임</div>
  <a href="#" onclick="return go(this,'pages/games.html')">게임 선택</a>
  <a href="#" onclick="return go(this,'pages/game-auth.html')">계정 연동</a>
  <a href="#" onclick="return go(this,'pages/main-game.html')">게임 메인</a>

  <div class="hub-group-label">클랜</div>
  <a href="#" onclick="return go(this,'pages/clan-auth.html')">클랜 인증</a>
  <a href="#" onclick="return go(this,'pages/main-clan.html')">클랜 메인</a>

  <div class="hub-group-label">디자인</div>
  <a href="#" onclick="return go(this,'pages/design-presets.html')">프리셋 스튜디오</a>
  <a href="#" onclick="return go(this,'pages/component-studio.html')">컴포넌트 스튜디오</a>

  <div class="hub-group-label hub-group-label--row">
    목업 권한
    <button type="button" class="hub-help-tip" data-tip="클랜 내 역할 — 클랜 메인 iframe에 적용합니다. 밸런스·관리는 운영진+ 전용입니다." aria-label="목업 권한 도움말">?</button>
  </div>
  <div class="hub-mock-role">
    <div class="hub-mock-role-btns">
      <button type="button" class="hub-mock-role-btn active" data-mock-role="leader" onclick="return hubSetMockRole(this,'leader')">클랜장</button>
      <button type="button" class="hub-mock-role-btn" data-mock-role="officer" onclick="return hubSetMockRole(this,'officer')">운영진</button>
      <button type="button" class="hub-mock-role-btn" data-mock-role="member" onclick="return hubSetMockRole(this,'member')">구성원</button>
    </div>
  </div>
  <div class="hub-group-label hub-group-label--row" style="margin-top:4px">
    목업 플랜
    <button type="button" class="hub-help-tip" data-tip="클랜 구독 플랜 — Free / Premium 목업 전환. 밸런스 등 Premium 전용 UI 표시와 연동됩니다." aria-label="목업 플랜 도움말">?</button>
  </div>
  <div class="hub-mock-plan">
    <div class="hub-mock-plan-btns">
      <button type="button" class="hub-mock-plan-btn active" data-mock-plan="free" onclick="return hubSetMockPlan(this,'free')">Free 플랜</button>
      <button type="button" class="hub-mock-plan-btn" data-mock-plan="premium" onclick="return hubSetMockPlan(this,'premium')">Premium 플랜</button>
    </div>
  </div>

<div class="hub-group-label hub-group-label--row" style="margin-top:4px">
  테마 스코프
</div>
<div class="hub-mock-theme">
  <div class="hub-mock-theme-btns">
    <button type="button" class="hub-mock-theme-btn active" data-theme-scope="dashboard" onclick="return hubSetThemeScope(this,'dashboard')">Dashboard</button>
    <button type="button" class="hub-mock-theme-btn" data-theme-scope="landing" onclick="return hubSetThemeScope(this,'landing')">Landing</button>
  </div>
</div>
<div class="hub-group-label hub-group-label--row" style="margin-top:4px">
  테마 모드
</div>
<div class="hub-mock-theme">
  <div class="hub-mock-theme-btns">
    <button type="button" class="hub-mock-theme-btn active" data-theme-mode="dark" onclick="return hubSetThemeMode(this,'dark')">Dark</button>
    <button type="button" class="hub-mock-theme-btn" data-theme-mode="light" onclick="return hubSetThemeMode(this,'light')">Light</button>
  </div>
</div>
</nav>

<main class="hub-main">
  <div class="hub-urlbar">
    <span class="hub-urlbar-label">경로</span>
    <span class="hub-urlbar-path" id="current-url">pages/index.html</span>
  </div>
  <iframe id="frame" class="hub-frame" src="pages/index.html"></iframe>
</main>

<div id="hub-tooltip-flyout" class="hub-tooltip-flyout" hidden role="tooltip"></div>

<script>
  var MOCK_ROLE_STORAGE = "clansync-hub-mock-role";
  var MOCK_PLAN_STORAGE = "clansync-hub-mock-plan";
  var MOCK_THEME_SCOPE_STORAGE = "clansync-hub-theme-scope";
  var MOCK_THEME_MODE_STORAGE = "clansync-hub-theme-mode";

  function hubGetMockRole() {
    try {
      var r = sessionStorage.getItem(MOCK_ROLE_STORAGE) || "leader";
      if (r === "member" || r === "officer" || r === "leader") return r;
    } catch (e) {}
    return "leader";
  }

  function hubGetMockPlan() {
    try {
      var pl = (sessionStorage.getItem(MOCK_PLAN_STORAGE) || "free").toLowerCase();
      if (pl === "premium" || pl === "pro") return "premium";
    } catch (e) {}
    return "free";
  }

  function hubGetThemeScope() {
    try {
      var s = (sessionStorage.getItem(MOCK_THEME_SCOPE_STORAGE) || "dashboard").toLowerCase();
      if (s === "landing") return "landing";
    } catch (e) {}
    return "dashboard";
  }

  function hubGetThemeMode() {
    try {
      var m = (sessionStorage.getItem(MOCK_THEME_MODE_STORAGE) || "dark").toLowerCase();
      if (m === "light") return "light";
    } catch (e) {}
    return "dark";
  }

  function hubApplyThemeToFrame() {
    var frame = document.getElementById("frame");
    if (!frame || !frame.contentDocument || !frame.contentDocument.body) return;
    var body = frame.contentDocument.body;
    body.setAttribute("data-theme-scope", hubGetThemeScope());
    body.setAttribute("data-theme-mode", hubGetThemeMode());
  }

  function hubClanMainSrc(opts) {
    opts = opts || {};
    var role = opts.role != null ? opts.role : hubGetMockRole();
    var plan = opts.plan != null ? opts.plan : hubGetMockPlan();
    var q =
      "role=" + encodeURIComponent(role) + "&plan=" + encodeURIComponent(plan);
    if (opts.hubDebug) q += "&hubDebug=1";
    return "pages/main-clan.html?" + q;
  }

  function go(el, path) {
    document.querySelectorAll(".hub-nav a").forEach(function (a) {
      a.classList.remove("active");
    });
    el.classList.add("active");
    var finalPath = path;
    if (path === "pages/main-clan.html") {
      finalPath = hubClanMainSrc();
    }
    document.getElementById("frame").src = finalPath;
    document.getElementById("current-url").textContent = finalPath;
    return false;
  }

  function hubReloadClanMainFrame() {
    var frame = document.getElementById("frame");
    var cur = document.getElementById("current-url").textContent || "";
    if (cur.indexOf("main-clan.html") < 0) return;
    var hash = "";
    try {
      hash = frame.contentWindow.location.hash || "";
    } catch (err) {}
    var hubDbg = cur.indexOf("hubDebug=1") >= 0;
    var next = hubClanMainSrc(hubDbg ? { hubDebug: true } : {}) + hash;
    frame.src = next;
    document.getElementById("current-url").textContent = next;
  }

  function hubSetMockRole(btn, role) {
    try {
      sessionStorage.setItem(MOCK_ROLE_STORAGE, role);
    } catch (e) {}
    document.querySelectorAll(".hub-mock-role-btn").forEach(function (b) {
      b.classList.toggle("active", b === btn);
    });
    hubReloadClanMainFrame();
    return false;
  }

  function hubSetMockPlan(btn, plan) {
    var normalized = plan === "premium" || plan === "pro" ? "premium" : "free";
    try {
      sessionStorage.setItem(MOCK_PLAN_STORAGE, normalized);
    } catch (e) {}
    document.querySelectorAll(".hub-mock-plan-btn").forEach(function (b) {
      b.classList.toggle("active", b === btn);
    });
    hubReloadClanMainFrame();
    return false;
  }

  function hubSetThemeScope(btn, scope) {
    var normalized = scope === "landing" ? "landing" : "dashboard";
    try {
      sessionStorage.setItem(MOCK_THEME_SCOPE_STORAGE, normalized);
    } catch (e) {}
    document.querySelectorAll(".hub-mock-theme-btn[data-theme-scope]").forEach(function (b) {
      b.classList.toggle("active", b === btn);
    });
    hubApplyThemeToFrame();
    return false;
  }

  function hubSetThemeMode(btn, mode) {
    var normalized = mode === "light" ? "light" : "dark";
    try {
      sessionStorage.setItem(MOCK_THEME_MODE_STORAGE, normalized);
    } catch (e) {}
    document.querySelectorAll(".hub-mock-theme-btn[data-theme-mode]").forEach(function (b) {
      b.classList.toggle("active", b === btn);
    });
    hubApplyThemeToFrame();
    return false;
  }

  document.addEventListener("DOMContentLoaded", function () {
    var r = hubGetMockRole();
    document.querySelectorAll(".hub-mock-role-btn").forEach(function (b) {
      b.classList.toggle("active", b.getAttribute("data-mock-role") === r);
    });
    var pl = hubGetMockPlan();
    document.querySelectorAll(".hub-mock-plan-btn").forEach(function (b) {
      b.classList.toggle("active", b.getAttribute("data-mock-plan") === pl);
    });
    var themeScope = hubGetThemeScope();
    document.querySelectorAll(".hub-mock-theme-btn[data-theme-scope]").forEach(function (b) {
      b.classList.toggle("active", b.getAttribute("data-theme-scope") === themeScope);
    });
    var themeMode = hubGetThemeMode();
    document.querySelectorAll(".hub-mock-theme-btn[data-theme-mode]").forEach(function (b) {
      b.classList.toggle("active", b.getAttribute("data-theme-mode") === themeMode);
    });

    var frame = document.getElementById("frame");
    if (frame) {
      frame.addEventListener("load", hubApplyThemeToFrame);
      hubApplyThemeToFrame();
    }

    /* 허브 도움말: .hub-nav overflow로 ::after 가 잘리므로 fixed 레이어 + 내부 스크롤 */
    (function hubTooltipFlyoutInit() {
      var fly = document.getElementById("hub-tooltip-flyout");
      if (!fly) return;
      var hideTimer = null;

      function hubTooltipHide() {
        if (hideTimer) {
          clearTimeout(hideTimer);
          hideTimer = null;
        }
        fly.setAttribute("hidden", "");
        fly.textContent = "";
      }

      function hubTooltipShow(btn) {
        if (hideTimer) {
          clearTimeout(hideTimer);
          hideTimer = null;
        }
        var tip = btn.getAttribute("data-tip") || "";
        fly.textContent = tip;
        fly.removeAttribute("hidden");
        fly.style.visibility = "hidden";
        var m = 8;
        var maxW = Math.min(320, window.innerWidth - 2 * m);
        fly.style.maxWidth = maxW + "px";
        var maxH = Math.min(0.72 * window.innerHeight, 520);
        fly.style.maxHeight = maxH + "px";
        var rect = btn.getBoundingClientRect();
        var fw = fly.offsetWidth;
        var fh = fly.offsetHeight;
        var left = rect.left;
        if (left + fw > window.innerWidth - m) {
          left = window.innerWidth - fw - m;
        }
        if (left < m) left = m;
        var gap = 8;
        var top = rect.bottom + gap;
        if (top + fh > window.innerHeight - m) {
          top = rect.top - fh - gap;
        }
        if (top < m) top = m;
        fly.style.left = left + "px";
        fly.style.top = top + "px";
        fly.style.visibility = "visible";
      }

      function scheduleHide() {
        hideTimer = setTimeout(hubTooltipHide, 140);
      }

      function cancelHide() {
        if (hideTimer) {
          clearTimeout(hideTimer);
          hideTimer = null;
        }
      }

      document.querySelectorAll(".hub-help-tip").forEach(function (btn) {
        btn.addEventListener("mouseenter", function () {
          cancelHide();
          hubTooltipShow(btn);
        });
        btn.addEventListener("mouseleave", function (e) {
          if (e.relatedTarget && fly.contains(e.relatedTarget)) return;
          scheduleHide();
        });
        btn.addEventListener("focus", function () {
          hubTooltipShow(btn);
        });
        btn.addEventListener("blur", function () {
          scheduleHide();
        });
      });

      fly.addEventListener("mouseenter", cancelHide);
      fly.addEventListener("mouseleave", scheduleHide);

      var nav = document.querySelector(".hub-nav");
      if (nav) nav.addEventListener("scroll", hubTooltipHide, true);
      window.addEventListener("resize", hubTooltipHide);
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") hubTooltipHide();
      });
    })();
  });
</script>
</body>
</html>
