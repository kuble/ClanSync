<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClanSync — 로그인</title>
<link rel="stylesheet" href="../styles/main.css">
<style>
body {
  background-color: var(--bg-base);
}
.auth-container {
  display: flex;
  min-height: 100vh;
}
.auth-left {
  flex: 1;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 60px;
  position: relative;
  overflow: hidden;
}
.auth-left-bg {
  position: absolute; inset: 0;
  background: none;
  pointer-events: none;
}
.auth-left-brand {
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}
.auth-left-tagline {
  font-size: 18px;
  color: var(--text-secondary);
  text-align: center;
  line-height: 1.6;
  max-width: 300px;
}
.auth-left-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 48px;
  width: 100%;
  max-width: 320px;
}
.auth-stat-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  text-align: center;
}
.auth-stat-num { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #34d399 0%, #10b981 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.auth-stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.auth-left-review {
  position: relative;
  max-width: 360px;
  color: var(--text-primary);
}
.auth-left-review-quote {
  font-size: 31px;
  line-height: 1;
  color: rgba(255, 255, 255, 0.12);
  margin-bottom: 12px;
}
.auth-left-review-text {
  font-size: 28px;
  line-height: 1.25;
  letter-spacing: -0.02em;
  font-weight: 700;
  margin-bottom: 20px;
}
.auth-left-review-author {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: var(--text-secondary);
}
.auth-left-review-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #052218;
  font-weight: 800;
}

.auth-right {
  width: 640px;
  order: -1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 88px;
}
.auth-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
.auth-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }

.form-group { margin-bottom: 18px; }
.error-msg {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: #f87171;
  margin-bottom: 18px;
}
.error-msg[hidden] { display: none; }

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 18px;
  margin-bottom: 24px;
}
.toggle-group { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
.toggle {
  width: 36px; height: 20px;
  background: var(--bg-overlay);
  border: 1px solid var(--border);
  border-radius: 99px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle.on { background: #34d399; border-color: #34d399; }
.toggle::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  background: white;
  border-radius: 50%;
  top: 2px; left: 2px;
  transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(16px); }

.forgot-link { font-size: 13px; color: #34d399; cursor: pointer; }
.forgot-link:hover { text-decoration: underline; }

.divider-text {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
  color: var(--text-muted);
  font-size: 13px;
}
.divider-text::before, .divider-text::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.social-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 11px;
  background: var(--bg-overlay);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 10px;
}
.social-btn:hover { border-color: rgba(52, 211, 153, 0.45); color: var(--text-primary); }

.auth-footer { text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 24px; }
.auth-footer a { color: #34d399; }
.auth-footer a:hover { text-decoration: underline; }

.auth-right .btn-primary {
  background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
  color: #052218;
  box-shadow: none;
}
.auth-right .btn-primary:hover {
  opacity: 0.95;
  transform: translateY(-1px);
}

@media (max-width: 768px) {
  .auth-left { display: none; }
  .auth-right { width: 100%; padding: 40px 24px; }
}

.back-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 0;
  border: none;
  border-radius: 0;
  background: transparent;
  font-size: 38px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  cursor: pointer;
  transition: opacity 0.15s;
}
.back-btn:hover {
  opacity: 0.92;
}
.back-btn-mark {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #052218;
  font-size: 18px;
  font-weight: 800;
}
.back-btn-mark svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 32;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.pwd-toggle-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  padding: 0;
}
.pwd-toggle-btn svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}
</style>
</head>
<body>
<div class="auth-container">

  <div class="auth-left">
    <div class="auth-left-bg"></div>
    <div class="auth-left-review">
      <p class="auth-left-review-text">클랜 운영이 훨씬 쉬워졌어요. 일정, 기록, 매칭까지 한 번에 정리됩니다.</p>
      <div class="auth-left-review-author">
        <span class="auth-left-review-avatar">K</span>
        <span>KR Phoenix · 클랜장</span>
      </div>
    </div>
  </div>

  <div class="auth-right">
    <a href="index.html" class="back-btn">
      <span class="back-btn-mark" aria-hidden="true">
        <svg viewBox="0 0 512 512">
          <path d="M434.8 137.65 285.44 69.55c-16.19-7.4-42.69-7.4-58.88 0L77.3 137.65c-17.6 8-17.6 21.09 0 29.09l148 67.5c16.89 7.7 44.69 7.7 61.58 0l148-67.5c17.52-8 17.52-21.1-.08-29.09Z"></path>
          <path d="m160 308.52-82.7 37.11c-17.6 8-17.6 21.1 0 29.1l148 67.5c16.89 7.69 44.69 7.69 61.58 0l148-67.5c17.6-8 17.6-21.1 0-29.1l-79.94-38.47"></path>
          <path d="m160 204.48-82.8 37.16c-17.6 8-17.6 21.1 0 29.1l148 67.49c16.89 7.7 44.69 7.7 61.58 0l148-67.49c17.7-8 17.7-21.1.1-29.1L352 204.48"></path>
        </svg>
      </span>
      <span>ClanSync</span>
    </a>

    <div style="margin-bottom: 32px">
      <div class="auth-title">다시 오신 걸 환영해요!</div>
      <div class="auth-subtitle">ClanSync 계정으로 로그인하세요.</div>
    </div>

    <form onsubmit="handleSignIn(event)">
      <!-- D-AUTH-06: 잠금/자격 불일치 통합 에러 슬롯 -->
      <div class="error-msg" id="signin-error-slot" hidden aria-live="polite">
        <span id="signin-error-text">이메일 또는 비밀번호가 올바르지 않거나, 잠시 후 다시 시도해 주세요.</span>
      </div>
      <div class="form-group">
        <label class="label">이메일</label>
        <input class="input" type="email" placeholder="your@email.com" id="email">
      </div>
      <div class="form-group">
        <label class="label">비밀번호</label>
        <div style="position:relative">
          <input class="input" type="password" placeholder="비밀번호를 입력하세요" id="password" style="padding-right:42px">
          <button type="button" class="pwd-toggle-btn" onclick="togglePwd(this)" aria-label="비밀번호 보기" title="비밀번호 보기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <div class="toggle-row">
        <div class="toggle-group" title="체크 시 약 30일간 자동 로그인이 유지됩니다. 공용 PC에서는 해제해 주세요. (D-AUTH-07)"
             onclick="this.querySelector('.toggle').classList.toggle('on'); showAutoLoginInfo(this.querySelector('.toggle'))">
          <div class="toggle" id="autoLogin" aria-label="자동 로그인 토글"></div>
          <span>자동 로그인</span>
        </div>
        <span class="forgot-link" onclick="showForgotAlert()">비밀번호 찾기</span>
      </div>

      <button type="submit" class="btn btn-primary w-full" style="padding:13px">
        로그인
      </button>
    </form>

    <div class="divider-text">또는</div>

    <button class="social-btn" type="button" onclick="showDiscordScopeAlert()">
      <span style="font-size:18px">💬</span>
      Discord로 계속하기
    </button>

    <div class="auth-footer">
      계정이 없으신가요? <a href="sign-up.html">회원가입</a>
    </div>
  </div>
</div>

<script src="../scripts/app.js"></script>
<script>
// D-AUTH-06 시뮬레이션 상수: IP+email 5회 연속 실패 → 15분 잠금
var SIGNIN_LOCK_THRESHOLD = 5;
var SIGNIN_LOCK_WINDOW_MS = 15 * 60 * 1000;
var SIGNIN_FAIL_STORAGE_KEY = 'clansync-mock-signin-fails-v1';

function signinReadFails() {
  try { return JSON.parse(sessionStorage.getItem(SIGNIN_FAIL_STORAGE_KEY) || '{}'); }
  catch (e) { return {}; }
}
function signinWriteFails(map) {
  sessionStorage.setItem(SIGNIN_FAIL_STORAGE_KEY, JSON.stringify(map));
}
function signinShowError(msg) {
  var slot = document.getElementById('signin-error-slot');
  var text = document.getElementById('signin-error-text');
  if (!slot || !text) return;
  text.textContent = msg || '이메일 또는 비밀번호가 올바르지 않거나, 잠시 후 다시 시도해 주세요.';
  slot.hidden = false;
}
function signinClearError() {
  var slot = document.getElementById('signin-error-slot');
  if (slot) slot.hidden = true;
}

// 목업 시연용: 이 접두사로 시작하는 이메일은 "자격 불일치"로 취급해 D-AUTH-06 잠금 흐름을 시연.
// 그 외 이메일은 기존 데모 클릭스루 유지(아무 값이나 통과 → games.html).
var SIGNIN_MOCK_FAIL_EMAIL_PREFIX = 'lock@';

function handleSignIn(e) {
  e.preventDefault();
  signinClearError();
  var email = document.getElementById('email').value.trim().toLowerCase();
  var pwd = document.getElementById('password').value;
  if (!email) {
    signinShowError('이메일을 입력해 주세요.');
    return;
  }
  if (!pwd) {
    signinShowError('비밀번호를 입력해 주세요.');
    return;
  }
  // D-AUTH-06 시뮬레이션: IP+email 5회 연속 실패 → 15분 잠금
  var fails = signinReadFails();
  var rec = fails[email] || { count: 0, lockedUntil: 0 };
  var now = Date.now();
  if (rec.lockedUntil && now < rec.lockedUntil) {
    signinShowError('이메일 또는 비밀번호가 올바르지 않거나, 잠시 후 다시 시도해 주세요.');
    return;
  }
  // 시연용 실패 케이스 외에는 기존 데모 클릭스루 유지
  if (!email.startsWith(SIGNIN_MOCK_FAIL_EMAIL_PREFIX)) {
    delete fails[email];
    signinWriteFails(fails);
    window.location.href = 'games.html';
    return;
  }
  rec.count = (rec.count || 0) + 1;
  if (rec.count >= SIGNIN_LOCK_THRESHOLD) {
    rec.lockedUntil = now + SIGNIN_LOCK_WINDOW_MS;
    rec.count = 0;
  }
  fails[email] = rec;
  signinWriteFails(fails);
  signinShowError('이메일 또는 비밀번호가 올바르지 않거나, 잠시 후 다시 시도해 주세요.');
}

function togglePwd(btn) {
  var input = btn.previousElementSibling;
  if (input.type === 'password') {
    input.type = 'text';
    btn.setAttribute('aria-label', '비밀번호 숨기기');
    btn.setAttribute('title', '비밀번호 숨기기');
  } else {
    input.type = 'password';
    btn.setAttribute('aria-label', '비밀번호 보기');
    btn.setAttribute('title', '비밀번호 보기');
  }
}

// D-AUTH-04: 비밀번호 찾기 — 실제 재설정 2화면은 Phase 2. 여기서는 요지만 안내.
function showForgotAlert() {
  alert([
    '비밀번호 찾기 (D-AUTH-04)',
    '',
    '- 이메일을 입력하면 재설정 링크가 담긴 메일을 보냅니다.',
    '- 토큰 유효기간: 1시간 · 1회용',
    '- 재발송 제한: 60초 간격, 24시간 5회',
    '- "가입된 이메일이면 메일을 보냈어요" (이메일 존재 여부는 응답에 노출하지 않음)',
    '- 재설정 성공 시 해당 사용자의 모든 세션이 즉시 로그아웃됩니다.',
    '',
    'Phase 2에서 /auth/reset-password?token=... 2단계 화면으로 구현됩니다.'
  ].join('\n'));
}

// D-AUTH-05: Discord OAuth — scope 한정 안내
function showDiscordScopeAlert() {
  alert([
    'Discord로 계속하기 (D-AUTH-05)',
    '',
    '요청 scope: identify + email (이 두 가지만)',
    '- 디스코드 서버(길드) 목록·메시지·음성 권한은 요청하지 않습니다.',
    '- 기존 ClanSync 계정과 이메일이 같고 검증 완료된 경우에만 자동 병합됩니다.',
    '- 클랜 ↔ Discord 알림 연동은 나중에 별도 Bot OAuth로 추가됩니다(로그인 scope는 확장되지 않음).'
  ].join('\n'));
}

// D-AUTH-07: 자동 로그인 유지 기간 안내 — 토글 ON 순간 1회만 노출
function showAutoLoginInfo(toggleEl) {
  if (!toggleEl || !toggleEl.classList.contains('on')) return;
  if (sessionStorage.getItem('clansync-mock-autologin-info-seen') === '1') return;
  sessionStorage.setItem('clansync-mock-autologin-info-seen', '1');
  alert('자동 로그인을 켜면 약 30일 동안 세션이 유지됩니다. 공용 PC에서는 사용하지 마세요. (D-AUTH-07)');
}
</script>
</body>
</html>
