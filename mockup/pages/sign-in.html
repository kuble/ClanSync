<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClanSync — 로그인</title>
<link rel="stylesheet" href="../styles/main.css">
<style>
.auth-container {
  display: flex;
  min-height: 100vh;
}
.auth-left {
  flex: 1;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 60px;
  position: relative;
  overflow: hidden;
}
.auth-left-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(124,58,237,0.18) 0%, transparent 70%);
  pointer-events: none;
}
.auth-left-brand {
  font-size: 32px;
  font-weight: 800;
  background: var(--gradient-brand);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}
.auth-left-tagline {
  font-size: 18px;
  color: var(--text-secondary);
  text-align: center;
  line-height: 1.6;
  max-width: 300px;
}
.auth-left-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 48px;
  width: 100%;
  max-width: 320px;
}
.auth-stat-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  text-align: center;
}
.auth-stat-num { font-size: 20px; font-weight: 700; background: var(--gradient-brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.auth-stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.auth-right {
  width: 480px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 56px;
}
.auth-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
.auth-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }

.form-group { margin-bottom: 18px; }
.error-msg {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: #f87171;
  margin-bottom: 18px;
}

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 18px;
  margin-bottom: 24px;
}
.toggle-group { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
.toggle {
  width: 36px; height: 20px;
  background: var(--bg-overlay);
  border: 1px solid var(--border);
  border-radius: 99px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle.on { background: var(--brand-primary); border-color: var(--brand-primary); }
.toggle::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  background: white;
  border-radius: 50%;
  top: 2px; left: 2px;
  transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(16px); }

.forgot-link { font-size: 13px; color: var(--brand-secondary); cursor: pointer; }
.forgot-link:hover { text-decoration: underline; }

.divider-text {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
  color: var(--text-muted);
  font-size: 13px;
}
.divider-text::before, .divider-text::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.social-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 11px;
  background: var(--bg-overlay);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 10px;
}
.social-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }

.auth-footer { text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 24px; }
.auth-footer a { color: var(--brand-secondary); }
.auth-footer a:hover { text-decoration: underline; }

@media (max-width: 768px) {
  .auth-left { display: none; }
  .auth-right { width: 100%; padding: 40px 24px; }
}

.back-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
}
.back-btn:hover { color: var(--text-primary); }
</style>
</head>
<body>
<div class="auth-container">

  <div class="auth-left">
    <div class="auth-left-bg"></div>
    <div style="position:relative">
      <div class="auth-left-brand">ClanSync</div>
      <div class="auth-left-tagline">클랜의 성적을 기록하고<br>내전과 스크림으로 함께 성장하세요</div>
      <div class="auth-left-stats">
        <div class="auth-stat-card">
          <div class="auth-stat-num">3,200+</div>
          <div class="auth-stat-label">활성 클랜</div>
        </div>
        <div class="auth-stat-card">
          <div class="auth-stat-num">98K+</div>
          <div class="auth-stat-label">누적 매치</div>
        </div>
        <div class="auth-stat-card">
          <div class="auth-stat-num">12K+</div>
          <div class="auth-stat-label">클랜원</div>
        </div>
        <div class="auth-stat-card">
          <div class="auth-stat-num">94%</div>
          <div class="auth-stat-label">평균 만족도</div>
        </div>
      </div>
    </div>
  </div>

  <div class="auth-right">
    <a href="index.html" class="back-btn">← 랜딩으로</a>

    <div style="margin-bottom: 32px">
      <div class="auth-title">다시 오신 걸 환영해요!</div>
      <div class="auth-subtitle">ClanSync 계정으로 로그인하세요.</div>
    </div>

    <form onsubmit="handleSignIn(event)">
      <div class="form-group">
        <label class="label">이메일</label>
        <input class="input" type="email" placeholder="your@email.com" id="email">
      </div>
      <div class="form-group">
        <label class="label">비밀번호</label>
        <div style="position:relative">
          <input class="input" type="password" placeholder="비밀번호를 입력하세요" id="password" style="padding-right:42px">
          <button type="button" onclick="togglePwd(this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px">보기</button>
        </div>
      </div>

      <div class="toggle-row">
        <div class="toggle-group" onclick="this.querySelector('.toggle').classList.toggle('on')">
          <div class="toggle" id="autoLogin"></div>
          <span>자동 로그인</span>
        </div>
        <span class="forgot-link">비밀번호 찾기</span>
      </div>

      <button type="submit" class="btn btn-primary w-full" style="padding:13px">
        로그인
      </button>
    </form>

    <div class="divider-text">또는</div>

    <button class="social-btn" type="button">
      <span style="font-size:18px">💬</span>
      Discord로 계속하기
    </button>

    <div class="auth-footer">
      계정이 없으신가요? <a href="sign-up.html">회원가입</a>
    </div>
  </div>
</div>

<script src="../scripts/app.js"></script>
<script>
function handleSignIn(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  if (!email) {
    alert('이메일을 입력해 주세요.');
    return;
  }
  window.location.href = 'games.html';
}
function togglePwd(btn) {
  const input = btn.previousElementSibling;
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '숨기기';
  } else {
    input.type = 'password';
    btn.textContent = '보기';
  }
}
</script>
</body>
</html>
