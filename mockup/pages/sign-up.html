<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClanSync — 회원가입</title>
<link rel="stylesheet" href="../styles/main.css">
<style>
body {
  background-color: var(--bg-base);
}
.auth-container { display: flex; min-height: 100vh; }
.auth-left {
  flex: 1;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 60px;
  position: relative;
  overflow: hidden;
}
.auth-left-bg {
  position: absolute; inset: 0;
  background: none;
  pointer-events: none;
}
.auth-left-review {
  position: relative;
  max-width: 360px;
  color: var(--text-primary);
}
.auth-left-review-text {
  font-size: 28px;
  line-height: 1.25;
  letter-spacing: -0.02em;
  font-weight: 700;
  margin-bottom: 20px;
}
.auth-left-review-author {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: var(--text-secondary);
}
.auth-left-review-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #052218;
  font-weight: 800;
}

.auth-right {
  width: 640px;
  order: -1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 88px;
  overflow-y: auto;
}
.auth-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
.auth-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }

.form-group { margin-bottom: 16px; }
.input-hint { font-size: 12px; color: var(--text-muted); margin-top: 5px; }
.input-error { font-size: 12px; color: var(--danger); margin-top: 5px; display: none; }

.pwd-strength {
  margin-top: 8px;
  display: flex;
  gap: 4px;
  align-items: center;
}
.pwd-strength-bar {
  flex: 1;
  height: 3px;
  background: var(--bg-overlay);
  border-radius: 99px;
  overflow: hidden;
}
.pwd-strength-fill { height: 100%; border-radius: 99px; transition: width 0.3s; }
.pwd-strength-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

.terms-row {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 13px; color: var(--text-secondary);
  margin-top: 8px; margin-bottom: 20px;
}
.terms-row input[type="checkbox"] {
  width: 16px; height: 16px;
  margin-top: 2px;
  accent-color: #34d399;
  cursor: pointer;
}
.terms-row a { color: #34d399; }

.gender-opt {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  user-select: none;
}
.gender-opt input { display: none; }
.gender-opt:has(input:checked) {
  background: rgba(52, 211, 153, 0.14);
  color: #34d399;
  font-weight: 600;
}
.gender-opt:not(:has(input:checked)):hover {
  background: var(--bg-overlay);
  color: var(--text-primary);
}

.back-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 0;
  border: none;
  border-radius: 0;
  background: transparent;
  font-size: 38px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  cursor: pointer;
  transition: opacity 0.15s;
}
.back-btn:hover { opacity: 0.92; }
.back-btn-mark {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #052218;
}
.back-btn-mark svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 32;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.pwd-toggle-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  padding: 0;
}
.pwd-toggle-btn svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.auth-right .btn-primary {
  background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
  color: #052218;
  box-shadow: none;
}
.auth-right .btn-primary:hover {
  opacity: 0.95;
  transform: translateY(-1px);
}

@media (max-width: 768px) {
  .auth-left { display: none; }
  .auth-right { width: 100%; padding: 40px 24px; }
}
</style>
</head>
<body>
<div class="auth-container">

  <div class="auth-left">
    <div class="auth-left-bg"></div>
    <div class="auth-left-review">
      <p class="auth-left-review-text">가입하고 나서 클랜 모집부터 스크림 기록까지 훨씬 빠르게 정리할 수 있었어요.</p>
      <div class="auth-left-review-author">
        <span class="auth-left-review-avatar">M</span>
        <span>MINT Squad · 운영진</span>
      </div>
    </div>
  </div>

  <div class="auth-right" style="position:relative">
    <a href="index.html" class="back-btn">
      <span class="back-btn-mark" aria-hidden="true">
        <svg viewBox="0 0 512 512">
          <path d="M434.8 137.65 285.44 69.55c-16.19-7.4-42.69-7.4-58.88 0L77.3 137.65c-17.6 8-17.6 21.09 0 29.09l148 67.5c16.89 7.7 44.69 7.7 61.58 0l148-67.5c17.52-8 17.52-21.1-.08-29.09Z"></path>
          <path d="m160 308.52-82.7 37.11c-17.6 8-17.6 21.1 0 29.1l148 67.5c16.89 7.69 44.69 7.69 61.58 0l148-67.5c17.6-8 17.6-21.1 0-29.1l-79.94-38.47"></path>
          <path d="m160 204.48-82.8 37.16c-17.6 8-17.6 21.1 0 29.1l148 67.49c16.89 7.7 44.69 7.7 61.58 0l148-67.49c17.7-8 17.7-21.1.1-29.1L352 204.48"></path>
        </svg>
      </span>
      <span>ClanSync</span>
    </a>

    <div style="margin-bottom: 28px">
      <div class="auth-title">ClanSync에 오신 걸 환영해요</div>
      <div class="auth-subtitle">몇 가지 정보만 입력하면 바로 시작할 수 있어요.</div>
    </div>

    <form onsubmit="handleSignUp(event)">
      <div class="form-group">
        <label class="label">이메일</label>
        <input class="input" type="email" id="email" placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label class="label">닉네임</label>
        <input class="input" type="text" id="nickname" placeholder="2~12자 (영문·한글·숫자)" maxlength="12"
               oninput="checkNickname(this)">
        <div class="input-error" id="nickname-err">이 닉네임은 사용할 수 없습니다</div>
      </div>

      <div style="display:flex;gap:12px">
        <div class="form-group" style="flex:1">
          <label class="label">출생 연도</label>
          <select class="input" id="birthYear" required>
            <option value="" disabled selected>선택</option>
          </select>
        </div>
        <div class="form-group" style="flex:1">
          <label class="label">성별</label>
          <div style="display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;height:44px">
            <label class="gender-opt" style="flex:1">
              <input type="radio" name="gender" value="male" required>
              <span>남</span>
            </label>
            <label class="gender-opt" style="flex:1;border-left:1px solid var(--border)">
              <input type="radio" name="gender" value="female">
              <span>여</span>
            </label>
            <label class="gender-opt" style="flex:1;border-left:1px solid var(--border)">
              <input type="radio" name="gender" value="private">
              <span>비공개</span>
            </label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="label">비밀번호</label>
        <div style="position:relative">
          <input class="input" type="password" id="password" placeholder="영문+숫자+특수문자 8자 이상"
                 oninput="checkPwdStrength(this.value)" style="padding-right:42px">
          <button type="button" class="pwd-toggle-btn" onclick="togglePwd(this)" aria-label="비밀번호 보기" title="비밀번호 보기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <div class="pwd-strength" id="pwd-strength" style="display:none">
          <div class="pwd-strength-bar"><div class="pwd-strength-fill" id="pwd-fill" style="width:0%;background:var(--danger)"></div></div>
          <div class="pwd-strength-bar"><div class="pwd-strength-fill" id="pwd-fill2" style="width:0%;background:var(--warning)"></div></div>
          <div class="pwd-strength-bar"><div class="pwd-strength-fill" id="pwd-fill3" style="width:0%;background:var(--success)"></div></div>
          <span class="pwd-strength-label" id="pwd-label">약함</span>
        </div>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms" required>
        <label for="terms">
          <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의합니다 (필수)
        </label>
      </div>

      <button type="submit" class="btn btn-primary w-full" style="padding:13px">
        가입하기
      </button>
    </form>

    <div style="text-align:center; font-size:13px; color:var(--text-secondary); margin-top:20px">
      이미 계정이 있으신가요? <a href="sign-in.html" style="color:#34d399">로그인</a>
    </div>
  </div>
</div>

<script src="../scripts/app.js"></script>
<script>
(function() {
  const sel = document.getElementById('birthYear');
  const cur = new Date().getFullYear();
  for (let y = cur - 10; y >= 1950; y--) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y + '년';
    sel.appendChild(opt);
  }
})();

function handleSignUp(e) {
  e.preventDefault();
  window.location.href = 'games.html';
}
function togglePwd(btn) {
  const input = btn.previousElementSibling;
  if (input.type === 'password') {
    input.type = 'text';
    btn.setAttribute('aria-label', '비밀번호 숨기기');
    btn.setAttribute('title', '비밀번호 숨기기');
  }
  else {
    input.type = 'password';
    btn.setAttribute('aria-label', '비밀번호 보기');
    btn.setAttribute('title', '비밀번호 보기');
  }
}
function checkNickname(input) {
  const err = document.getElementById('nickname-err');
  if (input.value === 'admin') {
    err.style.display = 'block';
    input.style.borderColor = 'var(--danger)';
  } else {
    err.style.display = 'none';
    input.style.borderColor = '';
  }
}
function checkPwdStrength(val) {
  const bar = document.getElementById('pwd-strength');
  if (!val) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Za-z]/.test(val) && /[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const labels = ['약함', '보통', '강함'];
  const colors = ['var(--danger)', 'var(--warning)', 'var(--success)'];
  ['pwd-fill','pwd-fill2','pwd-fill3'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.style.width = i < score ? '100%' : '0%';
    el.style.background = colors[score - 1] || 'var(--danger)';
  });
  document.getElementById('pwd-label').textContent = labels[score - 1] || '약함';
}
function checkPwdMatch() {
  const pwd = document.getElementById('password').value;
  const confirm = document.getElementById('password-confirm').value;
  const err = document.getElementById('pwd-match-err');
  if (confirm && pwd !== confirm) {
    err.style.display = 'block';
    document.getElementById('password-confirm').style.borderColor = 'var(--danger)';
  } else {
    err.style.display = 'none';
    document.getElementById('password-confirm').style.borderColor = '';
  }
}
</script>
</body>
</html>
